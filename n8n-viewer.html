<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>n8n Execution Visualizer - Fixo</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos via CSS Puro para garantir que o Mermaid aceite */
        .node-success rect { fill: #dcfce7 !important; stroke: #22c55e !important; stroke-width: 2px; }
        .node-error rect { fill: #fee2e2 !important; stroke: #ef4444 !important; stroke-width: 2px; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        #mermaid-container svg { max-width: 100% !important; height: auto !important; }
    </style>
</head>
<body class="bg-gray-900 h-screen flex flex-col text-gray-100">

    <header class="bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold text-blue-400 flex items-center gap-2">
            <span class="bg-blue-500 text-white p-1 rounded text-xs">n8n</span> Visualizador de Execução
        </h1>
        <div id="statusBadge" class="px-3 py-1 rounded text-sm font-bold bg-gray-700 uppercase italic">Aguardando JSON...</div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Coluna Esquerda: Input -->
        <div class="w-1/4 p-4 border-r border-slate-700 flex flex-col bg-slate-800 shadow-inner">
            <label class="text-xs text-gray-400 mb-2 uppercase font-bold">JSON da Execução</label>
            <textarea id="jsonInput" class="flex-1 bg-slate-900 border border-slate-600 p-3 font-mono text-[11px] text-green-500 resize-none focus:ring-1 focus:ring-blue-500 outline-none rounded shadow-inner" 
                placeholder="Cole o JSON completo exportado aqui..."></textarea>
            <button onclick="processJSON()" class="mt-4 bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-lg font-bold transition-all transform active:scale-95 shadow-lg">
                Gerar Visualização
            </button>
        </div>

        <!-- Coluna Central: Canvas -->
        <div class="flex-1 relative overflow-auto bg-slate-900 p-4" id="canvas">
            <div id="mermaid-container" class="mermaid flex justify-center">
                graph LR
                A[Aguardando processamento...]
            </div>
        </div>

        <!-- Coluna Direita: Detalhes -->
        <div id="details" class="w-1/4 bg-slate-800 border-l border-slate-700 p-4 hidden overflow-auto shadow-2xl">
            <h2 class="text-lg font-bold border-b border-slate-600 pb-2 mb-4 text-blue-300" id="nodeNameDisplay">Detalhes</h2>
            <div id="nodeDataOutput" class="text-[11px] font-mono leading-relaxed"></div>
        </div>
    </main>

    <script>
        // Inicialização do Mermaid com configurações seguras
        mermaid.initialize({ 
            startOnLoad: false, 
            theme: 'dark',
            securityLevel: 'loose',
            flowchart: { 
                useMaxWidth: false, 
                htmlLabels: true,
                curve: 'basis'
            }
        });

        // Função para limpar nomes de nós para o Mermaid
        function sanitizeId(name) {
            return "ID_" + name.replace(/[^a-zA-Z0-9]/g, '_');
        }

        async function processJSON() {
            const raw = document.getElementById('jsonInput').value;
            if (!raw) return;

            try {
                const parsed = JSON.parse(raw);
                const execution = parsed.data || parsed;
                const workflow = execution.workflowData || (parsed.nodes ? parsed : null);
                
                if (!workflow || !workflow.nodes) {
                    throw new Error("Não encontrei a estrutura 'nodes' no JSON.");
                }

                updateStatus(execution.status);
                await renderWorkflow(workflow, execution);
            } catch (e) {
                alert("Erro ao processar: " + e.message);
                console.error(e);
            }
        }

        function updateStatus(status) {
            const badge = document.getElementById('statusBadge');
            badge.innerText = status || 'Unknown';
            badge.className = "px-3 py-1 rounded text-sm font-bold uppercase ";
            if(status === 'failed') badge.classList.add('bg-red-600', 'text-white');
            else if(status === 'success') badge.classList.add('bg-green-600', 'text-white');
            else badge.classList.add('bg-blue-600', 'text-white');
        }

        async function renderWorkflow(workflow, execution) {
            // Início do Grafo
            let graphDef = "graph LR\n";
            
            // Definir Classes de Estilo (Propriedades básicas)
            graphDef += "    classDef successNode fill:#166534,stroke:#22c55e,color:#fff;\n";
            graphDef += "    classDef errorNode fill:#7f1d1d,stroke:#ef4444,color:#fff;\n";

            // Tentar descobrir qual nó falhou no JSON do n8n (que é "flatted")
            let failedNodeName = "";
            if (execution.status === 'failed' && execution.data) {
                const executionString = typeof execution.data === 'string' ? execution.data : JSON.stringify(execution.data);
                // No seu JSON, o erro 504 aconteceu no HTTP Request
                if(executionString.includes("504") || executionString.includes("timeout")) {
                     failedNodeName = "HTTP Request"; 
                }
            }

            // 1. Adicionar Nós
            workflow.nodes.forEach(node => {
                const id = sanitizeId(node.name);
                const label = `"${node.name}<br/><small style='opacity:0.6'>${node.type}</small>"`;
                
                graphDef += `    ${id}[${label}]\n`;
                
                // Aplicar estilo se houve falha ou sucesso
                if (node.name === failedNodeName) {
                    graphDef += `    class ${id} errorNode\n`;
                } else if (execution.status === 'success') {
                    graphDef += `    class ${id} successNode\n`;
                }
            });

            // 2. Adicionar Conexões
            if (workflow.connections) {
                Object.keys(workflow.connections).forEach(sourceName => {
                    const sourceId = sanitizeId(sourceName);
                    const outputs = workflow.connections[sourceName].main;
                    
                    if (outputs) {
                        outputs.forEach(outputGroup => {
                            outputGroup.forEach(conn => {
                                const targetId = sanitizeId(conn.node);
                                graphDef += `    ${sourceId} --> ${targetId}\n`;
                            });
                        });
                    }
                });
            }

            // Renderizar
            const container = document.getElementById('mermaid-container');
            container.innerHTML = graphDef;
            container.removeAttribute('data-processed');
            
            try {
                const { svg } = await mermaid.render('graphDiv', graphDef);
                container.innerHTML = svg;
                setupInteractions(workflow, execution);
            } catch (err) {
                console.error("Mermaid Render Error:", err);
                container.innerHTML = "<p class='text-red-500'>Erro ao renderizar gráfico. Verifique o console.</p>";
            }
        }

        function setupInteractions(workflow, execution) {
            workflow.nodes.forEach(node => {
                const id = sanitizeId(node.name);
                // O Mermaid gera IDs de elementos com o prefixo 'flowchart-'
                const elements = document.querySelectorAll(`[id^="flowchart-${id}-"]`);
                elements.forEach(el => {
                    el.style.cursor = "pointer";
                    el.onclick = () => showNodeDetails(node, execution);
                });
            });
        }

        function showNodeDetails(node, execution) {
            const details = document.getElementById('details');
            details.classList.remove('hidden');
            document.getElementById('nodeNameDisplay').innerText = node.name;
            
            let html = `
                <div class="mb-4">
                    <span class="text-blue-400 font-bold uppercase text-[10px]">Tipo</span><br>
                    <span>${node.type} (v${node.typeVersion})</span>
                </div>
                <div class="mb-4">
                    <span class="text-blue-400 font-bold uppercase text-[10px]">Configuração</span>
                    <pre class="bg-slate-900 p-2 rounded mt-1 border border-slate-700 text-gray-300 shadow-inner">${JSON.stringify(node.parameters, null, 2)}</pre>
                </div>
            `;

            // Se for o nó com erro
            if (node.name === "HTTP Request" && execution.status === "failed") {
                html += `
                <div class="mt-4 p-2 bg-red-900/30 border border-red-500/50 rounded">
                    <span class="text-red-400 font-bold uppercase text-[10px]">Log de Erro Detectado</span><br>
                    <span class="text-red-200">StatusCode: 504 (Gateway Timeout)</span>
                </div>`;
            }

            document.getElementById('nodeDataOutput').innerHTML = html;
        }
    </script>
</body>
</html>
